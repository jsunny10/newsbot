name: Daily Audit News Report

on:
  schedule:
    - cron: '10 9 * * *' # 한국 시간 오후 5시 (UTC 08:00)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Python Script
      env:
        NAVER_ID: ${{ secrets.NAVER_ID }}
        NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
        EMAIL_PW: ${{ secrets.EMAIL_PW }}
        TARGET_EMAILS: ${{ secrets.TARGET_EMAILS }}
      run: python audit_report.py
